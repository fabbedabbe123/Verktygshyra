<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sök verktyg — Verktygshyra</title>
  <meta name="description" content="Sök och filtrera verktyg för uthyrning i din stad." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/layout.css" />
</head>
<body>
  <a href="#main" class="skip-link">Hoppa till innehåll</a>

  <header class="nav">
    <div class="container nav-inner">
      <a href="../index.html" class="logo">
        <span class="logo-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="loop-path"><path d="M17 2.1 21 6l-4 3.9"/><path d="M3 12v-1a4 4 0 0 1 4-4h14"/><path d="M7 21.9 3 18l4-3.9"/><path d="M21 12v1a4 4 0 0 1-4 4H3"/></svg></span>
        Verktygshyra
      </a>
      <form class="nav-search" id="searchForm" role="search">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="search" id="searchInput" placeholder="Sök efter verktyg…" aria-label="Sök verktyg" />
      </form>
      <nav class="nav-links" aria-label="Huvudmeny">
        <a class="btn btn-ghost" href="my-tools.html">Hyr ut verktyg</a>
        <a class="btn btn-ghost" href="login.html">Logga in</a>
        <a class="btn btn-primary" href="register.html">Skapa konto</a>
      </nav>
      <button class="hamburger" aria-label="Öppna meny" aria-expanded="false">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
  </header>

  <main id="main" class="section section-tight">
    <div class="container">
      <div class="section-head">
        <div>
          <span class="eyebrow">Sök</span>
          <h2>Hitta verktyg nära dig</h2>
        </div>
      </div>

      <div id="categoryChips" class="filter-bar" role="group" aria-label="Filtrera på kategori"></div>

      <div class="search-layout">
        <aside class="search-filters">
          <div class="filter-group">
            <h4>Stad</h4>
            <select id="citySelect" aria-label="Filtrera på stad"></select>
          </div>
          <div class="filter-group">
            <h4>Pris per dag</h4>
            <label><input type="radio" name="price" /> Alla priser</label>
            <label><input type="radio" name="price" /> Under 75 kr</label>
            <label><input type="radio" name="price" /> 75–150 kr</label>
            <label><input type="radio" name="price" /> Över 150 kr</label>
          </div>
          <div class="filter-group">
            <h4>Betyg</h4>
            <label><input type="checkbox" /> 4.5+ stjärnor</label>
            <label><input type="checkbox" /> Fler än 10 recensioner</label>
          </div>
        </aside>

        <div>
          <p id="resultsCount" style="color: var(--color-text-muted); margin-bottom: var(--space-4); font-size: var(--fs-sm);"></p>
          <div class="tool-grid" id="resultsGrid"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-bottom">
      <span>© 2026 Verktygshyra. Alla rättigheter förbehållna.</span>
      <a href="../index.html" style="color: var(--color-green-600); font-weight:600;">Till startsidan</a>
    </div>
  </footer>

  <script type="module" src="../js/search.js"></script>
</body>
</html>
