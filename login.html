<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logga in — Verktygshyra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/layout.css" />
</head>
<body>
  <a href="#main" class="skip-link">Hoppa till innehåll</a>
  <header class="nav">
    <div class="container nav-inner">
      <a href="../index.html" class="logo">
        <span class="logo-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="loop-path"><path d="M17 2.1 21 6l-4 3.9"/><path d="M3 12v-1a4 4 0 0 1 4-4h14"/><path d="M7 21.9 3 18l4-3.9"/><path d="M21 12v1a4 4 0 0 1-4 4H3"/></svg></span>
        Verktygshyra
      </a>
      <div class="nav-actions">
        <a class="btn btn-ghost" href="register.html">Skapa konto</a>
      </div>
    </div>
  </header>

  <main id="main" class="auth-shell">
    <div class="auth-form-side">
      <div class="auth-card">
        <h1>Välkommen tillbaka</h1>
        <p>Logga in för att boka verktyg eller hantera dina annonser.</p>

        <form id="loginForm" novalidate>
          <div class="field">
            <label for="email">E-postadress</label>
            <input type="email" id="email" name="email" placeholder="du@exempel.se" required />
          </div>
          <div class="field">
            <label for="password">Lösenord</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg">Logga in</button>
        </form>

        <div class="divider-or">eller</div>
        <button class="btn btn-outline btn-block">Fortsätt med Google</button>

        <p class="auth-switch">Har du inget konto? <a href="register.html">Skapa ett här</a></p>
      </div>
    </div>
    <div class="auth-visual-side" aria-hidden="true">
      <blockquote>
        "Jag hyrde ut min högtryckstvätt 14 gånger förra året. Den hade annars bara stått i garaget."
        <cite>— Anna K., Malmö</cite>
      </blockquote>
    </div>
  </main>

  <script type="module" src="../js/auth.js"></script>
</body>
</html>
