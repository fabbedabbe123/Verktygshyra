<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mina verktyg — Verktygshyra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/layout.css" />
</head>
<body>
  <a href="#main" class="skip-link">Hoppa till innehåll</a>
  <header class="nav">
    <div class="container nav-inner">
      <a href="../index.html" class="logo">
        <span class="logo-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="loop-path"><path d="M17 2.1 21 6l-4 3.9"/><path d="M3 12v-1a4 4 0 0 1 4-4h14"/><path d="M7 21.9 3 18l4-3.9"/><path d="M21 12v1a4 4 0 0 1-4 4H3"/></svg></span>
        Verktygshyra
      </a>
      <nav class="nav-links">
        <a class="btn btn-ghost" href="profile.html">Min profil</a>
        <a class="btn btn-ghost" href="my-bookings.html">Mina bokningar</a>
      </nav>
      <button class="hamburger" aria-label="Öppna meny" aria-expanded="false">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
  </header>

  <main id="main" class="section section-tight">
    <div class="container dash-layout">
      <aside class="dash-sidebar">
        <div class="dash-profile">
          <div class="avatar">EK</div>
          <strong style="font-family: var(--font-display); font-size: var(--fs-lg);">Erik Karlsson</strong>
          <span style="color: var(--color-text-faint); font-size: var(--fs-xs);">Malmö · Medlem sedan 2024</span>
        </div>
        <nav class="dash-nav" aria-label="Kontomeny">
          <a href="profile.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c1.5-4.5 5-6 8-6s6.5 1.5 8 6"/></svg> Min profil</a>
          <a href="my-tools.html" class="is-active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8 12 3 3 8v8l9 5 9-5Z"/></svg> Mina verktyg</a>
          <a href="my-bookings.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18"/></svg> Mina bokningar</a>
          <a href="#"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg> Inställningar</a>
        </nav>
      </aside>

      <div>
        <div class="section-head" style="margin-bottom: var(--space-6);">
          <div>
            <span class="eyebrow">Uthyrare</span>
            <h2>Mina verktyg</h2>
          </div>
          <button class="btn btn-primary" id="addToolBtn">+ Lägg till verktyg</button>
        </div>

        <div class="tool-grid">
          <article class="tool-card">
            <div class="tool-card-media"><svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 30h26l6-6h14a4 4 0 0 1 4 4v4a4 4 0 0 1-4 4H32l-6-6"/></svg></div>
            <div class="tool-card-body">
              <div class="tool-card-top"><span class="tool-card-title">Bosch Professional Borrmaskin</span></div>
              <div class="tool-card-meta"><span class="badge">Aktiv</span></div>
              <div class="tool-card-top">
                <span style="font-size: var(--fs-xs); color: var(--color-text-muted);">12 uthyrningar</span>
                <span class="tool-card-price">89 kr<small> /dag</small></span>
              </div>
            </div>
          </article>
          <article class="tool-card">
            <div class="tool-card-media"><svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="12" y="18" width="18" height="24" rx="3"/></svg></div>
            <div class="tool-card-body">
              <div class="tool-card-top"><span class="tool-card-title">Kärcher Högtryckstvätt K5</span></div>
              <div class="tool-card-meta"><span class="badge">Aktiv</span></div>
              <div class="tool-card-top">
                <span style="font-size: var(--fs-xs); color: var(--color-text-muted);">47 uthyrningar</span>
                <span class="tool-card-price">119 kr<small> /dag</small></span>
              </div>
            </div>
          </article>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="../js/dashboard.js"></script>
  <script>
    document.getElementById("addToolBtn").addEventListener("click", () => {
      alert("Formulär för att lägga till verktyg kopplas till backend i nästa version.");
    });
  </script>
</body>
</html>
